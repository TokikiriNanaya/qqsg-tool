# Alembic 配置文件
[alembic]
# 迁移脚本存放目录
script_location = alembic

# 预处理修订文件名（使用日期+时间命名，如 20260719_2008）
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 截断修订标识符长度（0 = 不截断）
truncate_slug_length = 40

# 数据库版本号记录表（Alembic 在数据库中创建此表追踪迁移状态）
version_table = alembic_version

# 日志
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
